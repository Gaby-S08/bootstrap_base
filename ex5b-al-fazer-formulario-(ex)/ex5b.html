<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Minimalista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        
        body {
            background: linear-gradient(145deg,#001cf4, #2c3e50, #3498db, #0299fd);
            padding: 2rem;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border: none;
            border-radius: 15px;
            transition: transform 0.3s ease;
        }
        .form-control {
            border-radius: 10px;
            padding-left: 45px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25 margin-rgba(13, 110, 253, 0.1);
            border-color: #dee2e6;
        }
        .input-group-text {
            background: none;
            border: none;
            position: absolute;
            z-index: 10;
            padding-top: 10px;
            color: #0299fd;
        }
        .btn-modern {
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(189, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card login-card shadow-sm p-4 mx-auto">
                <div class="card-body">
                    <h3 class="text-center mb-4">Bem-vindo</h3>
                    
                    <form>
                        <div class="mb-3 position-relative">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" placeholder="Seu e-mail" required>
                        </div>

                        <div class="mb-4 position-relative">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" placeholder="Sua senha" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-modern">
                                Entrar <i class="bi bi-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>
                    
                    
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
