<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
    <div class="container mt-3">

        <div id="carouselExemplo" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://s2-g1.glbimg.com/OCt0YxQE3JIpcyy1Nsvi1QmQ0H0=/0x0:1280x853/1008x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2022/J/y/2KBZRrTRajJLSVdr7vzA/pexels-cottonbro-4686960.jpg" class="d-block w-100" alt="Slide 1">
                </div>
                <div class="carousel-item">
                    <img src="https://www.receitasdecomidas.com.br/wp-content/uploads/2019/08/receitas-de-doces-brigadeiro-1.jpg" class="d-block w-100" alt="Slide 2">
                </div>
                <div class="carousel-item">
                    <img src="https://st.depositphotos.com/1064024/3289/i/950/depositphotos_32891271-stock-photo-mixed-colorful-fruit-bonbon.jpg" class="d-block w-100" alt="Slide 3">
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>
  
        <hr class="my-5">
        <div id="carouselExemplo2" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://s2-g1.glbimg.com/OCt0YxQE3JIpcyy1Nsvi1QmQ0H0=/0x0:1280x853/1008x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2022/J/y/2KBZRrTRajJLSVdr7vzA/pexels-cottonbro-4686960.jpg" class="d-block w-100" alt="Slide 1">
                </div>
                <div class="carousel-item">
                    <img src="https://www.receitasdecomidas.com.br/wp-content/uploads/2019/08/receitas-de-doces-brigadeiro-1.jpg" class="d-block w-100" alt="Slide 2">
                </div>
                <div class="carousel-item">
                    <img src="https://st.depositphotos.com/1064024/3289/i/950/depositphotos_32891271-stock-photo-mixed-colorful-fruit-bonbon.jpg" class="d-block w-100" alt="Slide 3">
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo2" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo2" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
